  <!-- Contenido Principal -->
  <main class="flex-grow p-6 flex flex-col items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
      <h2 class="text-2xl font-bold text-gray-800 mb-4 text-center">Factura Rápida</h2>
      
      <!-- Formulario de simulación -->
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del Cliente</label>
          <input type="text" id="txtCliente" value="Cliente de Prueba" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Total a Cobrar ($)</label>
          <input type="number" id="txtTotal" value="150000" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">WhatsApp de Destino (Con código de país)</label>
          <input type="text" id="txtTelefono" placeholder="Ej: 573001234567" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <button id="btnProcesar" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg w-full transition duration-200 mt-2">
          Procesar y Enviar por WhatsApp
        </button>

        <!-- Estado de carga / feedback visual -->
        <p id="lblEstado" class="text-sm text-center font-medium mt-2 text-gray-500"></p>
      </div>
    </div>
  </main>

  <!-- RECUERDA: Agregar la etiqueta script antes del cierre de body -->
  <script src="js/geo.js"></script>
  <script src="js/app.js"></script>
