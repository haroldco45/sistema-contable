<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contable Cloud HM - PWA</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="img/icon-192.png" type="image/png">
  <meta name="theme-color" content="#1e3a8a">
  
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen text-gray-800 antialiased">

  <header class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center space-x-2">
      <div class="w-8 h-8 bg-white text-blue-900 rounded-lg flex items-center justify-center font-bold text-lg shadow">$</div>
      <h1 class="text-xl font-bold tracking-wide">Contable Cloud HM</h1>
    </div>
    <span class="bg-green-500 text-xs px-2.5 py-1 rounded-full text-white font-semibold flex items-center">
      <span class="w-2 h-2 bg-white rounded-full animate-pulse mr-1.5"></span> PWA Activa
    </span>
  </header>

  <main class="flex-grow p-4 md:p-6 flex items-center justify-center basic-full">
    <div class="bg-white p-6 md:p-8 rounded-xl shadow-xl max-w-md w-full border border-gray-100 my-auto">
      <div class="text-center mb-5">
        <h2 class="text-2xl font-bold text-gray-800">Factura Rápida</h2>
        <p class="text-gray-500 text-sm mt-1">Generación e integración de geolocalización inmediata</p>
      </div>
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Nombre del Cliente</label>
          <input type="text" id="txtCliente" value="Cliente de Prueba" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 focus:bg-white transition">
        </div>
        
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Total a Cobrar ($)</label>
          <input type="number" id="txtTotal" value="150000" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 focus:bg-white transition">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">WhatsApp de Destino</label>
          <input type="text" id="txtTelefono" placeholder="Ej: 573001234567" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 focus:bg-white transition">
          <p class="text-xs text-gray-400 mt-1">Incluya el código de país sin el signo +</p>
        </div>
        
        <button id="btnProcesar" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-6 rounded-lg w-full transition duration-200 mt-2 shadow-lg shadow-blue-600/20 active:scale-[0.98]">
          Procesar y Enviar por WhatsApp
        </button>

        <p id="lblEstado" class="text-sm text-center font-medium mt-2 text-gray-500 min-h-[24px]"></p>
      </div>
    </div>
  </main>

  <footer class="bg-gray-800 text-gray-400 text-center py-4 text-sm border-t border-gray-700">
    <p>© 2026 Todos los derechos reservados.</p>
    <p class="font-semibold text-white mt-1 tracking-wide">Hecha por VIBRAS POSITIVAS HM</p>
  </footer>

  <script src="js/geo.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
