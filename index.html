<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contable Cloud - PWA</title>
  <link rel="manifest" href="manifest.json">
  <!-- Favicon y tema móvil -->
  <link rel="icon" href="img/icon-192.png" type="image/png">
  <meta name="theme-color" content="#1e3a8a">
  <!-- Tailwind CSS para diseño rápido y responsivo -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { font-family: sans-serif; }
  </style>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">

  <!-- Encabezado / Navbar -->
  <header class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center">
    <h1 class="text-xl font-bold tracking-wide">Contable Cloud HM</h1>
    <span class="bg-green-500 text-xs px-2 py-1 rounded-full text-white font-semibold">PWA Activa</span>
  </header>

  <!-- Contenido Principal -->
  <main class="flex-grow p-6 flex flex-col items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-lg text-center max-w-md w-full">
      <h2 class="text-2xl font-bold text-gray-800 mb-2">¡Bienvenido a tu ERP Contable!</h2>
      <p class="text-gray-600 mb-6">Si estás en un navegador compatible, verás la opción de instalar esta app en tu pantalla de inicio.</p>
      
      <!-- Botón de acción rápido (para el futuro formulario) -->
      <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg w-full transition duration-200">
        Nueva Factura Rápida
      </button>
    </div>
  </main>

  <!-- Footer con Derechos de Autor Obligatorios -->
  <footer class="bg-gray-800 text-gray-400 text-center py-4 text-sm border-t border-gray-700">
    <p>&copy; 2026 Todos los derechos reservados.</p>
    <p class="font-semibold text-white mt-1">Hecha por Vibras Positivas HM</p>
  </footer>

  <!-- Vinculación de la lógica de la PWA -->
  <script src="js/app.js"></script>
</body>
</html>
