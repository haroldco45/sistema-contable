<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contable Cloud HM - PWA</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="img/icon-192.png" type="image/png">
  <meta name="theme-color" content="#1e3a8a">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; }
  </style>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">

  <header class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center">
    <div class="flex items-center space-x-2">
      <div class="w-8 h-8 bg-white text-blue-900 rounded-lg flex items-center justify-center font-bold text-lg shadow">$</div>
      <h1 class="text-xl font-bold tracking-wide">Contable Cloud HM</h1>
    </div>
    <span class="bg-green-500 text-xs px-2.5 py-1 rounded-full text-white font-semibold flex items-center space-x-1">
      <span class="w-2 h-2 bg-white rounded-full animate-pulse mr-1"></span> PWA Activa
    </span>
  </header>

  <main class="flex-grow p-4 md:p-6 flex flex-col items-center justify-center">
    <div class="bg-white p-6 md:p-8 rounded-xl shadow-xl max-w-md w-full border border-gray-100">
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Factura Rápida</h2>
        <p class="text-gray-500 text-sm mt-1">Generación e integración de geolocalización inmediata</p>
      </div>
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Nombre del Cliente</label>
          <input type="text" id="txtCliente" value="Cliente de Prueba" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 focus:bg-white transition">
        </div>
